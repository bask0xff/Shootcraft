<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ShootCraft MVP</title>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
            display: block;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: Arial;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="info">
    WASD - движение<br>
    Пробел - вверх<br>
    Shift - вниз<br>
    Клик по экрану - захват мыши
</div>

<canvas id="renderCanvas"></canvas>

<script src="https://cdn.babylonjs.com/babylon.js"></script>

<script>
const canvas = document.getElementById("renderCanvas");

const engine = new BABYLON.Engine(canvas, true);

const createScene = () => {

    const scene = new BABYLON.Scene(engine);

    scene.clearColor = new BABYLON.Color4(
        0.53,
        0.81,
        0.92,
        1
    );

    const camera = new BABYLON.UniversalCamera(
        "camera",
        new BABYLON.Vector3(0, 2, -10),
        scene
    );

    camera.attachControl(canvas, true);

    camera.speed = 0.4;

    camera.keysUp.push(87);
    camera.keysDown.push(83);
    camera.keysLeft.push(65);
    camera.keysRight.push(68);

    const light = new BABYLON.HemisphericLight(
        "light",
        new BABYLON.Vector3(0, 1, 0),
        scene
    );

    light.intensity = 1.0;

    const ground = BABYLON.MeshBuilder.CreateGround(
        "ground",
        {
            width: 100,
            height: 100
        },
        scene
    );

    const groundMaterial =
        new BABYLON.StandardMaterial(
            "groundMaterial",
            scene
        );

    groundMaterial.diffuseColor =
        new BABYLON.Color3(
            0.2,
            0.8,
            0.2
        );

    ground.material = groundMaterial;

    for (let x = -5; x <= 5; x++) {

        for (let z = -5; z <= 5; z++) {

            if (Math.random() > 0.7) {

                const block =
                    BABYLON.MeshBuilder.CreateBox(
                        "block",
                        {
                            size: 2
                        },
                        scene
                    );

                block.position =
                    new BABYLON.Vector3(
                        x * 3,
                        1,
                        z * 3
                    );
            }
        }
    }

    return scene;
};

const scene = createScene();

engine.runRenderLoop(() => {
    scene.render();
});

window.addEventListener(
    "resize",
    () => {
        engine.resize();
    }
);
</script>

</body>
</html>
