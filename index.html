<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ShootCraft Stable Hybrid</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

#renderCanvas {
    width: 100%;
    height: 100%;
    display: block;
}

#crosshair {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 10px;
    height: 10px;
    margin-left: -5px;
    margin-top: -5px;
    border: 2px solid white;
    border-radius: 50%;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="crosshair"></div>
<canvas id="renderCanvas"></canvas>

<script src="babylon.js"></script>

<script>

const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);
const scene = new BABYLON.Scene(engine);

// ===== LIGHT =====
new BABYLON.HemisphericLight(
    "light",
    new BABYLON.Vector3(0, 1, 0),
    scene
);

// ===== CAMERA =====
const camera = new BABYLON.UniversalCamera(
    "camera",
    new BABYLON.Vector3(0, 5, -10),
    scene
);

camera.attachControl(canvas, true);
camera.speed = 0.4;

// WASD
camera.keysUp.push(87);
camera.keysDown.push(83);
camera.keysLeft.push(65);
camera.keysRight.push(68);

// ВКЛЮЧАЕМ КОЛЛИЗИИ (XZ)
scene.collisionsEnabled = true;
camera.checkCollisions = true;
camera.ellipsoid = new BABYLON.Vector3(0.8, 1.8, 0.8);

// ===== GROUND =====
const ground = BABYLON.MeshBuilder.CreateGround("ground", {
    width: 50,
    height: 50
}, scene);

const gmat = new BABYLON.StandardMaterial("gmat", scene);
gmat.diffuseColor = new BABYLON.Color3(0.2, 0.8, 0.2);
ground.material = gmat;

ground.checkCollisions = true;

// ===== BLOCKS =====
function createBlock(x, y, z) {
    const b = BABYLON.MeshBuilder.CreateBox("block", { size: 2 }, scene);

    const m = new BABYLON.StandardMaterial("bm", scene);
    m.diffuseColor = new BABYLON.Color3(0.6, 0.4, 0.2);
    b.material = m;

    b.position.set(x, y, z);

    b.checkCollisions = true;

    return b;
}

// мир
for (let x = -3; x <= 3; x++) {
for (let z = -3; z <= 3; z++) {
    if (Math.random() > 0.6) {
        createBlock(x * 2, 1, z * 2);
    }
}
}

// ===== Y PHYSICS (прыжок) =====
let velocityY = 0;
const gravity = -0.03;
const groundY = 5;

let canJump = true;

// прыжок
window.addEventListener("keydown", (e) => {
    if (e.code === "Space" && canJump) {
        velocityY = 0.5;
        canJump = false;
        setTimeout(() => canJump = true, 500);
    }
});

// ===== LOOP =====
engine.runRenderLoop(() => {

    // Y движение отдельно (НЕ конфликтует с Babylon)
    velocityY += gravity;
    camera.position.y += velocityY;

    if (camera.position.y < groundY) {
        camera.position.y = groundY;
        velocityY = 0;
    }

    scene.render();
});

window.addEventListener("resize", () => engine.resize());

</script>

</body>
</html>
