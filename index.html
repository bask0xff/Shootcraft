<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ShootCraft MVP 2</title>

<style>
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
}

#renderCanvas {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
}

#info {
    position: absolute;
    left: 10px;
    top: 10px;
    color: white;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    font-family: Arial;
    z-index: 100;
}
</style>

</head>
<body>

<div id="info">
WASD - движение<br>
Space - прыжок<br>
Клик мышью - захват камеры
</div>

<canvas id="renderCanvas"></canvas>

<script src="babylon.js"></script>

<script>

const canvas = document.getElementById("renderCanvas");

const engine = new BABYLON.Engine(canvas, true);

const scene = new BABYLON.Scene(engine);

scene.gravity = new BABYLON.Vector3(0, -0.5, 0);
scene.collisionsEnabled = true;

scene.clearColor = new BABYLON.Color4(
    0.53,
    0.81,
    0.92,
    1
);

const light = new BABYLON.HemisphericLight(
    "light",
    new BABYLON.Vector3(0, 1, 0),
    scene
);

const camera = new BABYLON.UniversalCamera(
    "camera",
    new BABYLON.Vector3(0, 5, -10),
    scene
);

camera.attachControl(canvas, true);

camera.speed = 0.4;

camera.applyGravity = true;
camera.checkCollisions = true;

camera.ellipsoid = new BABYLON.Vector3(
    0.8,
    1.8,
    0.8
);

camera.keysUp.push(87);
camera.keysDown.push(83);
camera.keysLeft.push(65);
camera.keysRight.push(68);

const ground = BABYLON.MeshBuilder.CreateGround(
    "ground",
    {
        width: 100,
        height: 100
    },
    scene
);

ground.checkCollisions = true;

const groundMaterial =
    new BABYLON.StandardMaterial(
        "groundMaterial",
        scene
    );

groundMaterial.diffuseColor =
    new BABYLON.Color3(
        0.2,
        0.8,
        0.2
    );

ground.material = groundMaterial;

function createBlock(x, y, z) {

    const block =
        BABYLON.MeshBuilder.CreateBox(
            "block",
            {
                size: 2
            },
            scene
        );

    block.position =
        new BABYLON.Vector3(
            x,
            y,
            z
        );

    block.checkCollisions = true;

    return block;
}

createBlock(0, 1, 0);
createBlock(3, 1, 0);
createBlock(6, 1, 0);

createBlock(0, 1, 6);
createBlock(3, 1, 6);
createBlock(6, 1, 6);

createBlock(0, 1, 3);
createBlock(6, 1, 3);

let canJump = true;
let velocityY = 0;
const gravity = -0.03;
const playerGroundY = 2;

window.addEventListener("keydown", (event) => {

    if (event.code === "Space" && canJump) {

        //camera.cameraDirection.y += 0.8;
        velocityY = 0.45;
        canJump = false;
        setTimeout(() => {
            canJump = true;
        }, 600);
    }
});

engine.runRenderLoop(() => {
    velocityY += gravity;
    camera.position.y += velocityY;
    if (camera.position.y < playerGroundY) {
        camera.position.y = playerGroundY;
        velocityY = 0;
    }
    scene.render();
});

window.addEventListener("resize", () => {
    engine.resize();
});

</script>

</body>
</html>
