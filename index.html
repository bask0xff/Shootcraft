<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ShootCraft MVP 3</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

#renderCanvas {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
}

#crosshair {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 10px;
    height: 10px;
    margin-left: -5px;
    margin-top: -5px;
    border: 2px solid white;
    border-radius: 50%;
    z-index: 10;
}

#info {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    font-family: Arial;
    z-index: 10;
}
</style>

</head>

<body>

<div id="crosshair"></div>

<div id="info">
WASD - движение<br>
Space - прыжок<br>
ЛКМ - удалить блок<br>
ПКМ - поставить блок
</div>

<canvas id="renderCanvas"></canvas>

<script src="babylon.js"></script>

<script>

const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);
const scene = new BABYLON.Scene(engine);

// камера и физика
const camera = new BABYLON.UniversalCamera(
    "camera",
    new BABYLON.Vector3(0, 5, -10),
    scene
);

camera.attachControl(canvas, true);
camera.speed = 0.4;

camera.keysUp.push(87);
camera.keysDown.push(83);
camera.keysLeft.push(65);
camera.keysRight.push(68);

// свет
const light = new BABYLON.HemisphericLight(
    "light",
    new BABYLON.Vector3(0, 1, 0),
    scene
);

// земля
const ground = BABYLON.MeshBuilder.CreateGround("ground", {
    width: 100,
    height: 100
}, scene);

ground.checkCollisions = true;

// блоки
const blocks = [];

function createBlock(x, y, z) {
    const block = BABYLON.MeshBuilder.CreateBox("block", { size: 2 }, scene);
    block.position = new BABYLON.Vector3(x, y, z);
    block.checkCollisions = true;
    blocks.push(block);
    return block;
}

// фиксированная карта
createBlock(0, 1, 0);
createBlock(3, 1, 0);
createBlock(6, 1, 0);
createBlock(0, 1, 3);
createBlock(3, 1, 3);
createBlock(6, 1, 3);
createBlock(0, 1, 6);
createBlock(3, 1, 6);
createBlock(6, 1, 6);

// прыжок + гравитация
let velocityY = 0;
const gravity = -0.03;
const groundY = 2;

let canJump = true;

// прыжок
window.addEventListener("keydown", (e) => {
    if (e.code === "Space" && canJump) {
        velocityY = 0.5;
        canJump = false;
        setTimeout(() => canJump = true, 500);
    }
});

// raycast
function getPickedBlock() {
    const ray = camera.getForwardRay();
    return scene.pickWithRay(ray, (mesh) => blocks.includes(mesh));
}

// ЛКМ / ПКМ
window.addEventListener("mousedown", (e) => {

    const pick = getPickedBlock();

    if (e.button === 0) { // ЛКМ
        if (pick.hit && pick.pickedMesh) {
            pick.pickedMesh.dispose();
            const index = blocks.indexOf(pick.pickedMesh);
            if (index !== -1) blocks.splice(index, 1);
        }
    }

    if (e.button === 2) { // ПКМ
        const pickPoint = pick.pickedPoint;
        if (pickPoint) {
            createBlock(
                Math.round(pickPoint.x),
                Math.round(pickPoint.y),
                Math.round(pickPoint.z)
            );
        }
    }
});

// отключаем контекстное меню ПКМ
window.addEventListener("contextmenu", (e) => e.preventDefault());

// loop
engine.runRenderLoop(() => {

    velocityY += gravity;
    camera.position.y += velocityY;

    if (camera.position.y < groundY) {
        camera.position.y = groundY;
        velocityY = 0;
    }

    scene.render();
});

window.addEventListener("resize", () => engine.resize());

</script>

</body>
</html>
